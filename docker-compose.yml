version: '3.8'

services:
  mysql:
    image: mysql:8.2
    container_name: toong_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: toong_db
      MYSQL_USER: toong_user
      MYSQL_PASSWORD: toong1234
    ports:
      - "3306:3306"
    volumes:
      - toong_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: toong_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - toong_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  toong_mysql_data:
    driver: local
  toong_minio_data:
    driver: local
